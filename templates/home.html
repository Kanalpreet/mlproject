<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            color: white;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00f5ff, #8e2de2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        label {
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.25);
            background-color: rgba(255,255,255,0.08);
            color: white;
            margin-bottom: 18px;
            font-size: 14px;
            transition: 0.3s ease;
        }

        /* Dropdown fix */
        select.form-control option {
            background-color: #1e2a38;
            color: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 12px rgba(0,245,255,0.6);
            background-color: rgba(255,255,255,0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s ease;
            background: linear-gradient(90deg, #00f5ff, #8e2de2);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 245, 255, 0.5);
        }

        .result-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0,255,200,0.15);
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media(max-width: 600px) {
            .card {
                padding: 25px;
            }
            .title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="title">
        🎓 Student Performance Prediction
    </div>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <label>Gender</label>
        <select class="form-control" name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race / Ethnicity</label>
        <select class="form-control" name="ethnicity" required>
            <option selected disabled value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Level of Education</label>
        <select class="form-control" name="parental_level_of_education" required>
            <option selected disabled value="">Select Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
        </select>

        <label>Lunch Type</label>
        <select class="form-control" name="lunch" required>
            <option selected disabled value="">Select Lunch Type</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <label>Test Preparation Course</label>
        <select class="form-control" name="test_preparation_course" required>
            <option selected disabled value="">Select Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <label>Writing Score</label>
        <input type="number" name="writing_score" class="form-control" placeholder="Enter Writing Score out of 100" required>

        <label>Reading Score</label>
        <input type="number" name="reading_score" class="form-control" placeholder="Enter Reading Score out of 100" required>

        <button type="submit" class="btn">🚀 Predict Performance</button>

    </form>

    {% if results %}
        <div class="result-card">
            📊 Predicted Math Score: {{ results }}
        </div>
    {% endif %}

</div>

</body>
</html>
